services:
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian_trips
    ports:
      - "55432:5432"
    volumes:
      - meridian_pgdata:/var/lib/postgresql/data

volumes:
  meridian_pgdata: